<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Generator</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div class="container">
    <h1>QR Code Generator</h1>

    <p>Enter text or URL</p>

    <input type="text" id="text" placeholder="e.g. https://github.com">

    <button onclick="generateQR()">Generate QR Code</button>

    <div class="qr-box">
      <img id="qrImage" src="" alt="QR will appear here">
    </div>

    <a id="downloadBtn" download="qrcode.png">Download QR Code</a>
  </div>

  <script src="script.js"></script>
</body>
</html>
